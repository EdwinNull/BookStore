# Nginx 配置文件 - 书店前端应用
# 支持 SPA 路由、CORS 跨域和 API 反向代理

# 工作进程数，auto 会自动检测 CPU 核心数
worker_processes auto;

# 错误日志路径和级别
error_log /var/log/nginx/error.log warn;

# PID 文件路径
pid /var/run/nginx.pid;

events {
    # 每个工作进程的最大连接数
    worker_connections 1024;
}

http {
    # 包含 MIME 类型定义
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式定义
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # 访问日志路径
    access_log /var/log/nginx/access.log main;

    # 启用 sendfile 提高文件传输效率
    sendfile on;

    # TCP 优化
    tcp_nopush on;
    tcp_nodelay on;

    # 保持连接超时时间
    keepalive_timeout 65;

    # 开启 gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ============================================
    # 映射 CORS Origin（用于动态设置允许的来源）
    # ============================================
    # 仅允许指定的来源，其他来源返回空（拒绝跨域）
    map $http_origin $cors_origin {
        default "";
        "http://localhost:5173" $http_origin;
        "http://127.0.0.1:5173" $http_origin;
        "http://localhost" $http_origin;
        "http://127.0.0.1" $http_origin;
    }

    # 上游服务器定义 - 后端服务
    upstream backend {
        server backend-service:8080;
    }

    # ============================================
    # 主服务器配置
    # ============================================
    server {
        listen 80;
        server_name localhost;

        # 静态资源根目录
        root /usr/share/nginx/html;
        index index.html;

        # 安全头部设置
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ============================================
        # API 反向代理 - 处理 CORS 和预检请求
        # ============================================
        location /api {
            # ----------------------------------------
            # 处理 OPTIONS 预检请求（浏览器自动发送）
            # ----------------------------------------
            if ($request_method = 'OPTIONS') {
                # 允许的来源（使用映射变量动态设置）
                add_header 'Access-Control-Allow-Origin' $cors_origin always;

                # 允许的 HTTP 方法
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;

                # 允许的请求头（包括 Authorization）
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;

                # 允许携带凭证（Cookies、Authorization）
                add_header 'Access-Control-Allow-Credentials' 'true' always;

                # 预检请求缓存时间（秒）
                add_header 'Access-Control-Max-Age' '3600' always;

                # OPTIONS 请求不需要 body，直接返回 204
                add_header 'Content-Length' 0 always;
                add_header 'Content-Type' 'text/plain; charset=utf-8' always;
                return 204;
            }

            # ----------------------------------------
            # 反向代理到后端服务
            # ----------------------------------------
            proxy_pass http://backend;
            proxy_http_version 1.1;

            # 请求头设置
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # ----------------------------------------
            # 添加 CORS 响应头（非 OPTIONS 请求）
            # ----------------------------------------
            # 注意：使用 always 确保即使后端返回错误状态码也添加 CORS 头
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Expose-Headers' 'Authorization, Content-Type' always;
        }

        # ============================================
        # Swagger API 文档代理
        # ============================================
        location /swagger-ui {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS 支持
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }

        location /v3/api-docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # CORS 支持
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }

        # ============================================
        # 静态资源缓存设置 - JS/CSS/图片等
        # ============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ============================================
        # SPA 路由支持 - 所有路径都返回 index.html
        # 解决 Vue/React 单页应用刷新 404 问题
        # ============================================
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ============================================
        # 健康检查端点
        # ============================================
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
